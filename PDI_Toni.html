<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PDI – Toni</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --primary: #4b2e83;
      --accent: #f97316;
      --secondary: #2563eb;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 10px 25px rgba(15,23,42,0.08);
      --radius-lg: 18px;
      --radius-md: 10px;
      --radius-pill: 999px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    body {
     <script>
  (function () {
    const STORAGE_KEY = 'PDI_TONI_V1';

    function saveForm() {
      const data = {};
      document.querySelectorAll('input, textarea, select').forEach(el => {
        if (!el.name && !el.id) return;
        const key = el.name || el.id;
        data[key] = el.value;
      });
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {
        console.warn('Não foi possível salvar no navegador:', e);
      }
    }

    function loadForm() {
      let raw = null;
      try {
        raw = localStorage.getItem(STORAGE_KEY);
      } catch (e) {
        console.warn('Não foi possível ler do navegador:', e);
      }
      if (!raw) return;
      let data;
      try {
        data = JSON.parse(raw);
      } catch {
        return;
      }
      document.querySelectorAll('input, textarea, select').forEach(el => {
        if (!el.name && !el.id) return;
        const key = el.name || el.id;
        if (data[key] !== undefined) {
          el.value = data[key];
        }
      });
    }

    function init() {
      // Dá IDs ou names simples aos campos, se ainda não tiverem
      let idx = 0;
      document.querySelectorAll('input, textarea, select').forEach(el => {
        if (!el.name && !el.id) {
          el.id = 'field_' + (++idx);
        }
        el.addEventListener('input', saveForm);
        el.addEventListener('change', saveForm);
      });

      loadForm();
    }

    document.addEventListener('DOMContentLoaded', init);
  })();
</script>
