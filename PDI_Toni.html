<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PDI – Toni</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --primary: #4b2e83;
      --accent: #f97316;
      --secondary: #2563eb;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 10px 25px rgba(15,23,42,0.08);
      --radius-lg: 18px;
      --radius-md: 10px;
      --radius-pill: 999px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }

    body {
      background: radial-gradient(circle at top, #e0f2fe 0%, #f6f5ff 45%, #fdfdfd 100%);
      color: var(--text);
      padding: 24px 16px 40px;
      min-height: 100vh;
    }

    .app { max-width: 900px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .header-main { display: flex; align-items: center; gap: 12px; }

    .avatar {
      width: 44px; height: 44px; border-radius: 999px;
      background: radial-gradient(circle at top, #bfdbfe, #4b2e83);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: #f9fafb;
      box-shadow: var(--shadow); flex-shrink: 0;
    }

    .headline { display: flex; flex-direction: column; gap: 2px; }
    .headline h1 { font-size: 20px; font-weight: 700; }
    .headline p { font-size: 13px; color: var(--muted); }

    .back-link {
      font-size: 12px; color: var(--primary); text-decoration: none;
      padding: 6px 12px; border-radius: var(--radius-pill);
      border: 1px solid rgba(75,46,131,0.3);
      background: rgba(75,46,131,0.03); white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0,1.6fr) minmax(0,1.1fr);
      gap: 18px;
    }

    @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }

    .panel {
      background: #ffffff; border-radius: var(--radius-lg);
      padding: 18px 18px 20px; box-shadow: var(--shadow);
      border: 1px solid rgba(148,163,184,0.25);
    }

    .panel h2 {
      font-size: 15px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }

    .panel h2 span { font-size: 11px; color: var(--muted); font-weight: 500; }

    .section { margin-bottom: 14px; }
    .section:last-child { margin-bottom: 0; }

    .section-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }

    .field-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .field { flex: 1 1 140px; display: flex; flex-direction: column; gap: 4px; }

    label { font-size: 12px; color: var(--muted); }

    input[type="text"],
    input[type="date"],
    textarea,
    select {
      width: 100%; padding: 7px 9px; border-radius: 8px;
      border: 1px solid var(--border); font-size: 13px;
      color: var(--text); background: #f9fafb; resize: vertical;
    }

    textarea { min-height: 70px; }

    input:focus, textarea:focus, select:focus {
      outline: 2px solid rgba(75,46,131,0.3);
      border-color: var(--primary); background: #ffffff;
    }

    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 9px; border-radius: var(--radius-pill);
      background: #fef3c7; border: 1px solid #fcd34d;
      font-size: 11px; color: #92400e; margin-top: 4px;
    }

    .pill small { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.8; }

    .badge {
      display: inline-block; padding: 3px 8px;
      border-radius: var(--radius-pill); font-size: 11px;
      background: #ecfdf3; color: #166534; border: 1px solid #bbf7d0;
    }

    .disc-note { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.6; }

    .subtle { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Metas ── */
    .goals-list { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }

    .goal-item {
      border-radius: 8px; border: 1px dashed var(--border);
      padding: 10px; background: #f9fafb;
      display: flex; flex-direction: column; gap: 6px;
      position: relative;
    }

    .goal-item label { font-size: 12px; color: var(--muted); font-weight: 600; }

    .goal-item textarea { min-height: 60px; background: #ffffff; }

    .goal-line { font-size: 12px; color: var(--muted); }

    .remove-goal {
      position: absolute; top: 8px; right: 8px;
      background: none; border: none; cursor: pointer;
      font-size: 14px; color: var(--muted); line-height: 1;
      padding: 2px 5px; border-radius: 4px;
      transition: background .15s;
    }

    .remove-goal:hover { background: #fee2e2; color: #dc2626; }

    .btn-add-meta {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 8px; padding: 7px 14px;
      border-radius: var(--radius-pill);
      border: 1px dashed var(--primary);
      background: rgba(75,46,131,0.04);
      color: var(--primary); font-size: 13px;
      cursor: pointer; font-weight: 500;
      transition: background .15s;
    }

    .btn-add-meta:hover { background: rgba(75,46,131,0.1); }

    /* ── Lateral ── */
    .side-section { margin-bottom: 16px; }
    .side-section h3 { font-size: 13px; margin-bottom: 6px; color: var(--muted); font-weight: 600; }
    .side-section p { font-size: 13px; color: var(--text); line-height: 1.5; }

    /* ── Check-in ── */
    .checkin-list { display: flex; flex-direction: column; gap: 12px; margin-top: 6px; }

    .checkin-item {
      border: 1px solid var(--border); border-radius: 10px;
      padding: 10px; background: #f9fafb;
      display: flex; flex-direction: column; gap: 6px;
    }

    .checkin-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .checkin-row .field { flex: 1 1 120px; }

    .checkin-item textarea {
      min-height: 60px; background: #ffffff;
      font-size: 12px;
    }

    .checkin-label { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 2px; }

    .heatbar {
      width: 100%; height: 6px; background: #e5e7eb;
      border-radius: 999px; overflow: hidden; margin-top: 4px;
    }

    .heatbar-fill {
      height: 100%; border-radius: inherit;
      background: linear-gradient(90deg, var(--secondary), var(--accent));
      width: 0;
    }

    .hint { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

    ul.quick { list-style: none; padding-left: 0; margin-top: 6px; font-size: 13px; }
    ul.quick li { margin-bottom: 4px; }
  </style>
</head>
